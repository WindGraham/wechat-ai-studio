<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:320px; padding:16px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size:14px; color:#333; background:#fafafa; }
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
    .gear { font-size:16px; background:none; border:none; cursor:pointer; padding:2px 4px; border-radius:4px; color:#999; width:auto; }
    .gear:hover { background:#e0e0e0; color:#333; }
    h2 { font-size:15px; font-weight:600; margin-bottom:2px; }
    .ver { font-size:11px; color:#999; margin-bottom:10px; }
    .section { margin-bottom:12px; }
    .label { font-size:12px; color:#666; font-weight:500; margin-bottom:3px; }
    .card { background:#fff; border:1px solid #e0e0e0; border-radius:8px; padding:10px; }
    .card .page-title { font-size:13px; font-weight:500; color:#1a73e8; word-break:break-all; line-height:1.4; }
    .card .page-url { font-size:11px; color:#999; word-break:break-all; margin-top:2px; }
    .card .page-size { font-size:11px; color:#999; margin-top:1px; }
    .card .no-content { font-size:12px; color:#c5221f; }
    button { width:100%; padding:10px; border:none; border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; }
    .btn-capture { background:#1a73e8; color:#fff; }
    .btn-capture:hover { background:#1557b0; }
    .btn-capture:disabled { background:#ccc; cursor:not-allowed; }
    .btn-save { background:#ff9800; color:#fff; margin-top:8px; }
    .btn-save:hover { background:#f57c00; }
    .btn-save:disabled { background:#ccc; cursor:not-allowed; }
    .btn-inject { background:#07c160; color:#fff; margin-top:8px; }
    .btn-inject:hover { background:#06ae56; }
    .btn-inject:disabled { background:#ccc; cursor:not-allowed; }
    .btn-refresh { background:#f0f0f0; color:#333; margin-top:8px; }
    .btn-refresh:hover { background:#e0e0e0; }
    .target-list { list-style:none; }
    .target-item { padding:8px 10px; background:#fff; border:1px solid #e0e0e0; border-radius:6px; margin-bottom:5px; cursor:pointer; display:flex; align-items:center; gap:8px; }
    .target-item:hover { border-color:#07c160; }
    .target-item.selected { border-color:#07c160; background:#e8f5e9; }
    .target-thumb { width:28px; height:28px; border-radius:50%; background:#e0e0e0; flex-shrink:0; }
    .target-info { flex:1; min-width:0; }
    .target-name { font-size:12px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .target-title { font-size:11px; color:#999; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .status { font-size:12px; padding:6px 8px; border-radius:4px; margin-top:6px; }
    .status-info { background:#e8f4fd; color:#1a73e8; }
    .status-success { background:#e8f5e9; color:#2e7d32; }
    .status-error { background:#fce8e6; color:#c5221f; }
    .hidden { display:none; }
    .settings-panel { background:#fff; border:1px solid #e0e0e0; border-radius:8px; padding:10px; margin-bottom:12px; }
    .settings-panel label { display:block; font-size:12px; color:#666; margin-bottom:4px; }
    .settings-panel input { width:100%; padding:6px 8px; border:1px solid #ccc; border-radius:4px; font-size:12px; font-family:monospace; margin-bottom:8px; }
    .settings-panel input:focus { border-color:#1a73e8; outline:none; }
    .settings-row { display:flex; gap:6px; }
    .settings-row button { width:auto; padding:6px 12px; font-size:12px; }
    .btn-sm-ok { background:#1a73e8; color:#fff; }
    .btn-sm-ok:hover { background:#1557b0; }
    .current-path { font-size:11px; color:#999; margin:4px 0 8px; word-break:break-all; }
    .current-path .edit-link { color:#1a73e8; cursor:pointer; margin-left:4px; }
    .current-path .edit-link:hover { text-decoration:underline; }
    .hint { font-size:11px; color:#999; margin-top:6px; line-height:1.4; }
    .steps { font-size:11px; color:#666; line-height:1.6; margin-bottom:10px; }
    .steps span { color:#1a73e8; font-weight:600; }
  </style>
</head>
<body>

  <div class="header">
    <h2>📡 注入到微信公众号</h2>
    <button class="gear" id="gearBtn" title="设置保存目录">⚙️</button>
  </div>
  <div class="ver" id="version">v1.0.0</div>

  <div class="settings-panel hidden" id="settingsPanel">
    <label>模板保存目录（绝对路径）</label>
    <input type="text" id="pathInput" placeholder="/home/user/my-project">
    <div class="settings-row">
      <button class="btn-sm-ok" id="savePathBtn">保存</button>
      <button class="btn-refresh" id="cancelPathBtn" style="width:auto;padding:6px 12px;font-size:12px;">取消</button>
    </div>
  </div>

  <div class="current-path hidden" id="currentPathRow">
    保存到: <span id="currentPathValue"></span><span class="edit-link" id="editPathLink">修改</span>
  </div>

  <div class="section">
    <div class="label">当前页面</div>
    <div class="card" id="pageCard">
      <div class="no-content">Ctrl+A 选中内容后点击捕获</div>
    </div>
  </div>

  <button class="btn-capture" id="captureBtn">📋 捕获选区</button>
  <button class="btn-save hidden" id="saveBtn">💾 保存为模板</button>

  <div class="section hidden" id="targetSection">
    <div class="label">目标编辑器</div>
    <button class="btn-refresh" id="refreshBtn">🔄 查找微信编辑器</button>
    <ul class="target-list" id="targetList"></ul>
  </div>

  <button class="btn-inject hidden" id="injectBtn" disabled>📩 注入</button>

  <div id="statusArea"></div>

  <div class="hint">步骤：<br>
  <span>1</span> 在任意页面 Ctrl+A 选中内容<br>
  <span>2</span> 点击 ⚙️ 填入项目目录，启动 save-layout-server.py<br>
  <span>3</span> 点击「捕获选区」→ 可「保存为模板」或继续注入<br>
  <span>4</span> 注入需另开标签页进入微信图文编辑页</div>

  <script src="popup.js"></script>
</body>
</html>
