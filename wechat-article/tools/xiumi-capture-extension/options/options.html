<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>秀米选区本地保存设置</title>
  <style>
    body { width: 720px; max-width: calc(100vw - 48px); margin: 32px auto; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #222; }
    h1 { font-size: 22px; margin: 0 0 18px; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    button { margin-top: 18px; padding: 10px 16px; border: 0; border-radius: 6px; background: #1677ff; color: #fff; cursor: pointer; font-size: 14px; }
    button.secondary { margin-left: 8px; background: #f0f0f0; color: #222; }
    .hint { color: #666; line-height: 1.7; font-size: 13px; }
    .status { margin-top: 14px; padding: 10px 12px; border-radius: 6px; background: #f6f8fa; white-space: pre-wrap; }
    .ok { background: #e8f5e9; color: #1b5e20; }
    .error { background: #fce8e6; color: #b3261e; }
  </style>
</head>
<body>
  <h1>秀米选区本地保存设置</h1>

  <p class="hint">使用前先启动 <code>save-layout-server.py</code>。点击扩展图标或按快捷键 <code>Ctrl+Shift+U</code> 后，扩展会捕获当前活动页面的选区并保存到本地。</p>

  <label for="serverUrl">保存服务器地址</label>
  <input id="serverUrl" placeholder="http://localhost:8081/save-template">

  <label for="savePath">模板保存目录</label>
  <input id="savePath" placeholder="/home/graham/Projects/wechat-ai-publisher/ xiumi_test">

  <button id="saveBtn">保存设置</button>
  <button id="testBtn" class="secondary">测试服务器</button>

  <div id="status" class="status">正在读取设置...</div>

  <script src="options.js"></script>
</body>
</html>
